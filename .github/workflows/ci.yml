name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript

    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20'
        with:
          name: ts-coverage
          path: typescript/coverage/

  # ---------------------------------------------------------------------------
  # Python
  # ---------------------------------------------------------------------------
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install git+https://github.com/mainlayer/mainlayer-python.git && pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type-check with mypy
        run: mypy src/mainlayer_webhooks

      - name: Run tests with coverage
        run: pytest --cov=mainlayer_webhooks --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: py-coverage
          path: python/coverage.xml

  # ---------------------------------------------------------------------------
  # Combined status gate
  # ---------------------------------------------------------------------------
  all-green:
    name: All checks passed
    needs: [typescript, python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.typescript.result }}" != "success" || "${{ needs.python.result }}" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All jobs passed."
